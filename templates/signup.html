<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#42a5f5,#66bb6a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#1e88e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

<br>

<a href="/login">Already have an account? Login</a>

</div>

</body>
</html>
